<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="100" r="2" fill="#fbbf24" opacity="0.5"/>
  <circle cx="750" cy="50" r="3" fill="#fbbf24" opacity="0.3"/>
  <circle cx="700" cy="160" r="1.5" fill="#fbbf24" opacity="0.4"/>
  
  <!-- Title -->
  <text x="400" y="65" font-family="monospace" font-size="36" font-weight="bold" 
        fill="url(#gold)" text-anchor="middle">K-Septenary</text>
  
  <!-- Tagline -->
  <text x="400" y="95" font-family="sans-serif" font-size="14" fill="#9ca3af" 
        text-anchor="middle">Essentially Lossless 3-bit KV Cache Quantization</text>
  
  <!-- Stats -->
  <text x="400" y="125" font-family="monospace" font-size="11" fill="#6b7280" 
        text-anchor="middle">+0.03 PPL  |  81% Memory Savings  |  100% State Efficiency</text>
  
  <!-- Badge -->
  <rect x="300" y="140" width="200" height="28" rx="14" fill="#fbbf24" opacity="0.15"/>
  <text x="400" y="159" font-family="monospace" font-size="10" fill="#fbbf24" 
        text-anchor="middle">Kenji Septenary  ★</text>
</svg>
